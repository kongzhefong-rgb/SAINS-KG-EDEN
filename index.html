<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小小科学家：科学探索乐园</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #e0f2fe;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        /* 16:9 游戏容器 */
        #gameViewport {
            width: 100vw;
            height: 56.25vw; 
            max-height: 100vh;
            max-width: 177.78vh; 
            background: white;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border-radius: 12px;
        }

        .game-card {
            flex: 1;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .btn-game {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-game:active { transform: scale(0.95); }

        .hidden { display: none; }

        .matched {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
            pointer-events: none;
            opacity: 0.9;
        }

        .wrong-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.6);
            display: flex; align-items: center; justify-content: center;
            font-size: 5rem; color: #ef4444; z-index: 50;
            pointer-events: none;
        }

        .floating {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .option-btn {
            background: white;
            border: 4px solid #e5e7eb;
            border-radius: 16px;
            padding: 1.2rem;
            font-size: 1.8rem;
            font-weight: bold;
            color: #374151;
            width: 100%;
        }

        .matching-item {
            cursor: pointer;
            border: 4px solid #f0f0f0;
            border-radius: 16px;
            background: white;
            padding: 0.75rem;
            text-align: center;
            font-weight: bold;
            font-size: 1.25rem;
        }
        .selected {
            border-color: #fbbf24 !important;
            background-color: #fffbeb !important;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://cdn.pixabay.com/audio/2022/01/21/audio_31b343360b.mp3" type="audio/mpeg">
    </audio>

    <div id="gameViewport">
        <!-- 顶部工具 -->
        <div class="absolute top-4 left-4 z-40">
            <button id="musicToggle" class="bg-white/90 p-2 rounded-full shadow-sm text-xl border border-gray-100 btn-game" onclick="toggleMusic()">🔇</button>
        </div>

        <!-- 消息弹窗 -->
        <div id="messageBox" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-black/30">
            <div class="bg-white border-8 border-orange-400 p-10 rounded-[40px] text-center shadow-2xl scale-110 max-w-sm">
                <div id="messageEmoji" class="text-7xl mb-4">🌟</div>
                <div id="messageText" class="text-3xl font-bold text-gray-700">真棒!</div>
                <button onclick="closeMessage()" class="mt-8 bg-orange-400 text-white px-12 py-3 rounded-full text-xl font-bold shadow-lg btn-game">确定</button>
            </div>
        </div>

        <!-- 首页 -->
        <div id="startScreen" class="game-card text-center bg-gradient-to-b from-blue-50 to-white">
            <h1 class="text-5xl font-bold text-orange-500 mb-10 floating">小小科学家：探索乐园</h1>
            <div class="grid grid-cols-2 gap-8">
                <button onclick="selectUnit(1)" class="w-64 bg-white border-4 border-yellow-300 p-6 rounded-3xl shadow-xl hover:bg-yellow-50 btn-game">
                    <div class="text-2xl font-bold text-yellow-600">单元一：五种感官</div>
                </button>
                <button onclick="selectUnit(2)" class="w-64 bg-white border-4 border-green-300 p-6 rounded-3xl shadow-xl hover:bg-green-50 btn-game">
                    <div class="text-2xl font-bold text-green-600">单元二：生物与非生物</div>
                </button>
                <button onclick="selectUnit(3)" class="w-64 bg-white border-4 border-blue-300 p-6 rounded-3xl shadow-xl hover:bg-blue-50 btn-game">
                    <div class="text-2xl font-bold text-blue-600">单元三：人类</div>
                </button>
                <button onclick="selectUnit(4)" class="w-64 bg-white border-4 border-purple-300 p-6 rounded-3xl shadow-xl hover:bg-purple-50 btn-game">
                    <div class="text-2xl font-bold text-purple-600">单元四：动物</div>
                </button>
            </div>
        </div>

        <!-- 单元一菜单 -->
        <div id="unit1Menu" class="hidden game-card bg-blue-50">
            <h2 class="text-4xl font-bold text-blue-600 mb-8">单元一：五种感官</h2>
            <div class="grid grid-cols-3 gap-6 w-full max-w-4xl px-10">
                <button onclick="showGame('u1g1')" class="bg-blue-400 text-white p-6 rounded-xl text-xl font-bold shadow btn-game">游戏一：配配乐</button>
                <button onclick="showGame('u1g2')" class="bg-pink-400 text-white p-6 rounded-xl text-xl font-bold shadow btn-game">游戏二：食物分类</button>
                <button onclick="showGame('u1g3')" class="bg-orange-400 text-white p-6 rounded-xl text-xl font-bold shadow btn-game">游戏三：神奇的感觉</button>
            </div>
            <button onclick="backToHome()" class="mt-10 bg-gray-400 text-white px-8 py-3 rounded-full font-bold text-lg flex items-center gap-2 btn-game">🏠 返回首页</button>
        </div>

        <!-- 单元二菜单 -->
        <div id="unit2Menu" class="hidden game-card bg-green-50">
            <h2 class="text-4xl font-bold text-green-600 mb-8">单元二：生物与非生物</h2>
            <div class="grid grid-cols-3 gap-4 w-full max-w-5xl px-10">
                <button onclick="showGame('u2g1')" class="bg-teal-400 text-white p-4 rounded-xl text-lg font-bold shadow btn-game">游戏一：生物需要什么</button>
                <button onclick="showGame('u2g2')" class="bg-lime-500 text-white p-4 rounded-xl text-lg font-bold shadow btn-game">游戏二：生物</button>
                <button onclick="showGame('u2g3')" class="bg-purple-400 text-white p-4 rounded-xl text-lg font-bold shadow btn-game">游戏三：特征配对</button>
                <button onclick="showGame('u2g4')" class="bg-emerald-500 text-white p-4 rounded-xl text-lg font-bold shadow btn-game">游戏四：植物部位</button>
                <button onclick="showGame('u2g5')" class="bg-indigo-400 text-white p-4 rounded-xl text-lg font-bold shadow btn-game">游戏五：交通工具</button>
            </div>
            <button onclick="backToHome()" class="mt-8 bg-gray-400 text-white px-8 py-2 rounded-full font-bold text-lg flex items-center gap-2 btn-game">🏠 返回首页</button>
        </div>

        <!-- 单元三菜单 -->
        <div id="unit3Menu" class="hidden game-card bg-blue-50">
            <h2 class="text-4xl font-bold text-blue-600 mb-8">单元三：人类</h2>
            <div class="grid grid-cols-1 gap-6 w-full max-w-xl">
                <button onclick="showGame('u3g1')" class="bg-blue-400 text-white p-6 rounded-xl text-xl font-bold shadow btn-game">游戏一：我的身体</button>
            </div>
            <button onclick="backToHome()" class="mt-10 bg-gray-400 text-white px-8 py-3 rounded-full font-bold text-lg flex items-center gap-2 btn-game">🏠 返回首页</button>
        </div>

        <!-- 单元四菜单 -->
        <div id="unit4Menu" class="hidden game-card bg-purple-50">
            <h2 class="text-4xl font-bold text-purple-600 mb-8">单元四：动物</h2>
            <div class="grid grid-cols-2 gap-6 w-full max-w-3xl px-10">
                <button onclick="showGame('u4g1')" class="bg-purple-400 text-white p-6 rounded-xl text-xl font-bold shadow btn-game">游戏一：动物种类</button>
                <button onclick="showGame('u4g2')" class="bg-fuchsia-400 text-white p-6 rounded-xl text-xl font-bold shadow btn-game">游戏二：动物特征</button>
            </div>
            <button onclick="backToHome()" class="mt-10 bg-gray-400 text-white px-8 py-3 rounded-full font-bold text-lg flex items-center gap-2 btn-game">🏠 返回首页</button>
        </div>

        <!-- 游戏区域 -->
        <!-- U1G1 -->
        <div id="u1g1" class="hidden game-card bg-white">
            <h2 class="text-2xl font-bold text-blue-500 mb-6">配配乐：连一连器官和功能</h2>
            <div class="flex justify-between w-full max-w-3xl gap-10">
                <div class="flex flex-col gap-2 w-1/2" id="u1g1-organs"></div>
                <div class="flex flex-col gap-2 w-1/2" id="u1g1-actions"></div>
            </div>
            <button onclick="showUnitMenu(1)" class="mt-6 bg-gray-100 px-6 py-2 rounded-full font-bold text-gray-500 flex items-center gap-2 btn-game">🏠 返回菜单</button>
        </div>

        <!-- U1G2 -->
        <div id="u1g2" class="hidden game-card bg-pink-50">
            <h2 id="u1g2Title" class="text-2xl font-bold text-pink-600 mb-6">选出健康的食物</h2>
            <div id="u1g2Grid" class="grid grid-cols-4 gap-4 w-full max-w-3xl"></div>
            <button onclick="showUnitMenu(1)" class="mt-6 bg-gray-100 px-6 py-2 rounded-full font-bold text-gray-500 flex items-center gap-2 btn-game">🏠 返回菜单</button>
        </div>

        <!-- U1G3 -->
        <div id="u1g3" class="hidden game-card bg-orange-50">
            <h2 id="u1g3Title" class="text-2xl font-bold text-orange-600 mb-4">这是什么感觉？</h2>
            <div class="mb-4 flex flex-col items-center">
                <div id="u1g3Image" class="text-8xl bg-white p-4 rounded-full shadow-sm"></div>
                <p id="u1g3TargetName" class="text-xl font-bold text-gray-400 mt-2"></p>
            </div>
            <div id="u1g3Options" class="grid grid-cols-3 gap-4 w-full max-w-3xl"></div>
            <button onclick="showUnitMenu(1)" class="mt-6 bg-gray-100 px-6 py-2 rounded-full font-bold text-gray-500 flex items-center gap-2 btn-game">🏠 返回菜单</button>
        </div>

        <!-- U3G1: 我的身体 - 重制版 -->
        <div id="u3g1" class="hidden game-card bg-blue-50">
            <h2 class="text-3xl font-bold text-blue-600 mb-8">这是身体的哪个部位？</h2>
            <div class="flex flex-col items-center justify-center w-full max-w-4xl">
                <!-- 展示大图 -->
                <div id="u3g1Image" class="text-[10rem] mb-10 bg-white p-12 rounded-full shadow-lg border-8 border-blue-100 leading-none">👀</div>
                <!-- 选项 -->
                <div id="u3g1Options" class="grid grid-cols-2 gap-10 w-full max-w-2xl px-10">
                    <!-- 动态生成二个按钮 -->
                </div>
            </div>
            <button onclick="showUnitMenu(3)" class="mt-12 bg-gray-100 px-8 py-3 rounded-full font-bold text-gray-500 flex items-center gap-2 btn-game">🏠 返回菜单</button>
        </div>

        <!-- U4G1 -->
        <div id="u4g1" class="hidden game-card bg-purple-50">
            <h2 class="text-2xl font-bold text-purple-600 mb-6">这是哪一类动物？</h2>
            <div id="u4g1Display" class="flex flex-col items-center mb-8">
                <div id="u4g1Emoji" class="text-8xl bg-white p-4 rounded-full shadow-sm">🐶</div>
                <div id="u4g1Name" class="text-2xl font-bold text-gray-500 mt-2">狗</div>
            </div>
            <div id="u4g1Options" class="grid grid-cols-2 gap-4 w-full max-w-2xl"></div>
            <button onclick="showUnitMenu(4)" class="mt-6 bg-gray-100 px-6 py-2 rounded-full font-bold text-gray-500 flex items-center gap-2 btn-game">🏠 返回菜单</button>
        </div>

        <!-- U4G2 -->
        <div id="u4g2" class="hidden game-card bg-fuchsia-50">
            <h2 class="text-2xl font-bold text-fuchsia-600 mb-6">请选出该类动物的特征：</h2>
            <div id="u4g2Display" class="mb-6 p-4 bg-white rounded-2xl shadow-sm text-3xl font-bold text-fuchsia-500">哺乳动物</div>
            <div id="u4g2Options" class="grid grid-cols-2 gap-4 w-full max-w-3xl"></div>
            <button onclick="showUnitMenu(4)" class="mt-6 bg-gray-100 px-6 py-2 rounded-full font-bold text-gray-500 flex items-center gap-2 btn-game">🏠 返回菜单</button>
        </div>

        <!-- 单元二内容 -->
        <div id="u2g1" class="hidden game-card bg-teal-50"><h2 class="text-2xl font-bold text-teal-600 mb-6">生物需要什么</h2><div id="u2g1Grid" class="grid grid-cols-4 gap-4 w-full max-w-3xl"></div><button onclick="showUnitMenu(2)" class="mt-6 bg-gray-100 px-6 py-2 rounded-full font-bold flex items-center gap-2 btn-game">🏠 返回菜单</button></div>
        <div id="u2g2" class="hidden game-card bg-lime-50"><h2 class="text-2xl font-bold text-lime-600 mb-6">生物</h2><div id="u2g2Grid" class="grid grid-cols-4 gap-4 w-full max-w-3xl"></div><button onclick="showUnitMenu(2)" class="mt-6 bg-gray-100 px-6 py-2 rounded-full font-bold flex items-center gap-2 btn-game">🏠 返回菜单</button></div>
        <div id="u2g3" class="hidden game-card bg-purple-50"><h2 class="text-2xl font-bold text-purple-600 mb-4">特征配对</h2><div class="mb-4 flex flex-col items-center"><div id="u2g3Emoji" class="text-8xl bg-white p-4 rounded-full shadow-sm"></div><p id="u2g3Name" class="text-xl font-bold text-gray-400 mt-2"></p></div><div id="u2g3Options" class="grid grid-cols-3 gap-4 w-full max-w-3xl"></div><button onclick="showUnitMenu(2)" class="mt-6 bg-gray-100 px-6 py-2 rounded-full font-bold flex items-center gap-2 btn-game">🏠 返回菜单</button></div>
        <div id="u2g4" class="hidden game-card bg-emerald-50"><h2 class="text-2xl font-bold text-emerald-600 mb-4">植物的部位</h2><div class="mb-4 flex flex-col items-center"><div id="u2g4Emoji" class="text-8xl bg-white p-4 rounded-full shadow-sm">🌿</div><p id="u2g4PartName" class="text-xl font-bold text-gray-400 mt-2"></p></div><div id="u2g4Options" class="grid grid-cols-3 gap-4 w-full max-w-3xl"></div><button onclick="showUnitMenu(2)" class="mt-6 bg-gray-100 px-6 py-2 rounded-full font-bold flex items-center gap-2 btn-game">🏠 返回菜单</button></div>
        <div id="u2g5" class="hidden game-card bg-indigo-50"><h2 class="text-2xl font-bold text-indigo-600 mb-4">交通工具</h2><div class="mb-4 flex flex-col items-center"><div id="u2g5Emoji" class="text-8xl bg-white p-4 rounded-full shadow-sm">✈️</div><p id="u2g5VehicleName" class="text-xl font-bold text-gray-400 mt-2"></p></div><div id="u2g5Options" class="grid grid-cols-3 gap-4 w-full max-w-3xl"></div><button onclick="showUnitMenu(2)" class="mt-6 bg-gray-100 px-6 py-2 rounded-full font-bold flex items-center gap-2 btn-game">🏠 返回菜单</button></div>

    </div>

    <script>
        let isMusicPlaying = false;
        const bgMusic = document.getElementById('bgMusic');
        let nextCallback = null;

        function speakFeedback(isCorrect) {
            const text = isCorrect ? "真棒" : "再试一试";
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 1.3;
            window.speechSynthesis.speak(utterance);
        }

        function toggleMusic() {
            isMusicPlaying = !isMusicPlaying;
            if (isMusicPlaying) { bgMusic.play().catch(()=>{}); document.getElementById('musicToggle').innerText = '🔊'; }
            else { bgMusic.pause(); document.getElementById('musicToggle').innerText = '🔇'; }
        }

        function selectUnit(u) {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById(`unit${u}Menu`).classList.remove('hidden');
            if (!isMusicPlaying) toggleMusic();
        }

        function backToHome() {
            document.querySelectorAll('[id$="Menu"], .game-card').forEach(el => el.classList.add('hidden'));
            document.getElementById('startScreen').classList.remove('hidden');
        }

        function showUnitMenu(u) {
            document.querySelectorAll('.game-card').forEach(el => el.classList.add('hidden'));
            document.getElementById(`unit${u}Menu`).classList.remove('hidden');
        }

        function showGame(id) {
            document.querySelectorAll('[id^="unit"], .game-card').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'u1g1') initU1G1();
            if(id === 'u1g2') initU1G2(1);
            if(id === 'u1g3') { u1g3Idx = 0; initU1G3(); }
            if(id === 'u2g1') initU2G1();
            if(id === 'u2g2') initU2G2();
            if(id === 'u2g3') { u2g3Idx = 0; initU2G3(); }
            if(id === 'u2g4') { u2g4Idx = 0; initU2G4(); }
            if(id === 'u2g5') { u2g5Idx = 0; initU2G5(); }
            if(id === 'u3g1') { u3g1Idx = 0; initU3G1(); }
            if(id === 'u4g1') { u4g1Idx = 0; initU4G1(); }
            if(id === 'u4g2') { u4g2Idx = 0; initU4G2(); }
        }

        function showMessage(t) {
            document.getElementById('messageText').innerText = t;
            document.getElementById('messageBox').classList.remove('hidden');
            speakFeedback(true);
        }

        function closeMessage() {
            document.getElementById('messageBox').classList.add('hidden');
            if(nextCallback) { const cb = nextCallback; nextCallback = null; cb(); }
        }

        // --- 单元一 游戏 ---
        function initU1G1() {
            const data = [{id:1,o:'鼻子',s:'👃',a:'闻'},{id:2,o:'眼睛',s:'👀',a:'看'},{id:3,o:'耳朵',s:'👂',a:'听'},{id:4,o:'舌头',s:'👅',a:'尝'},{id:5,o:'手',s:'✋',a:'感觉'}];
            const orgCont = document.getElementById('u1g1-organs'); const actCont = document.getElementById('u1g1-actions');
            orgCont.innerHTML = ''; actCont.innerHTML = ''; let selOrg = null; let count = 0;
            [...data].sort(()=>Math.random()-0.5).forEach(item => {
                const b = document.createElement('div'); b.className = "matching-item"; b.innerHTML = `${item.s} ${item.o}`;
                b.onclick = () => { if(b.classList.contains('matched')) return; document.querySelectorAll('#u1g1-organs .matching-item').forEach(x=>x.classList.remove('selected')); b.classList.add('selected'); selOrg = item; };
                orgCont.appendChild(b);
            });
            [...data].sort(()=>Math.random()-0.5).forEach(item => {
                const b = document.createElement('div'); b.className = "matching-item"; b.innerText = item.a;
                b.onclick = () => {
                    if(b.classList.contains('matched') || !selOrg) return;
                    if(selOrg.id === item.id) { b.classList.add('matched'); document.querySelector('#u1g1-organs .selected').classList.add('matched'); count++; if(count===5) setTimeout(()=>showMessage("你全找对啦"),300); selOrg = null; }
                    else { speakFeedback(false); const x = document.createElement('div'); x.className = 'wrong-overlay'; x.innerText = '❌'; b.appendChild(x); setTimeout(()=>b.removeChild(x),500); }
                };
                actCont.appendChild(b);
            });
        }
        function initU1G2(page) {
            const grid = document.getElementById('u1g2Grid'); grid.innerHTML = ''; let count = 0;
            const h = [{n:'苹果',i:'🍎'},{n:'西兰花',i:'🥦'},{n:'牛奶',i:'🥛'},{n:'香蕉',i:'🍌'},{n:'胡萝卜',i:'🥕'}];
            const u = [{n:'糖果',i:'🍬'},{n:'薯条',i:'🍟'},{n:'甜甜圈',i:'🍩'},{n:'汽水',i:'🥤'},{n:'汉堡',i:'🍔'}];
            const isH = page === 1; document.getElementById('u1g2Title').innerText = isH ? "选出健康的食物" : "选出不健康的食物";
            const targets = isH ? h : u; const noise = isH ? u : [{n:'鱼',i:'🐟'},{n:'蛋',i:'🥚'},{n:'橙',i:'🍊'},{n:'水',i:'💧'}];
            const items = [...targets.slice(0,4).map(x=>({...x,c:true})), ...noise.slice(0,4).map(x=>({...x,c:false}))].sort(()=>Math.random()-0.5);
            items.forEach(item => {
                const b = document.createElement('button'); b.className = "relative bg-white border-2 border-gray-100 p-3 rounded-2xl shadow-sm btn-game text-center";
                b.innerHTML = `<div class="text-4xl mb-1">${item.i}</div><div class="font-bold text-sm">${item.n}</div>`;
                b.onclick = () => { if(item.c) { if(!b.classList.contains('matched')){ b.classList.add('matched'); count++; if(count===4) { setTimeout(()=> { if(isH) { showMessage("真棒！现在来找不健康的。"); nextCallback=()=>initU1G2(2); } else showMessage("你全找对啦！"); }, 300); } else speakFeedback(true); } } else { speakFeedback(false); const x = document.createElement('div'); x.className = 'wrong-overlay'; x.innerText = '❌'; b.appendChild(x); setTimeout(()=>b.removeChild(x),500); } };
                grid.appendChild(b);
            });
        }
