<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小小科学家：科学探索乐园</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --header-h: 12vh;
            --main-h: 88vh;
            /* 游戏进行时的比例分配 */
            --stage-h: 63vh;
            --options-h: 25vh;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #0f172a;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        /* 核心容器 */
        #gameViewport {
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            background: #f8fafc;
            position: relative;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
        }

        #gameViewport.maximized {
            width: 100vw !important;
            height: 100vh !important;
            max-width: none !important;
            max-height: none !important;
            border-radius: 0;
        }

        /* 顶部导航 */
        header { 
            height: var(--header-h); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 2vw; 
            background: white; 
            border-bottom: 2px solid #e2e8f0; 
            z-index: 50; 
        }

        /* 主内容区 */
        #main-area {
            height: var(--main-h);
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        /* 关卡选择大容器（垂直水平居中，无舞台占位） */
        #unit-level-selector {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4vh;
            background: radial-gradient(circle at center, #f0f9ff 0%, #f8fafc 100%);
        }

        /* 游戏运行时的舞台 */
        #play-stage { 
            height: var(--stage-h); 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            padding: 1vh; 
        }

        /* 游戏运行时的底部操作栏 */
        #play-options { 
            height: var(--options-h); 
            background: #f1f5f9; 
            border-top: 4px solid #cbd5e1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 1vh 2vw; 
        }

        /* 响应式文字 */
        .text-title { font-size: 3.5vh; font-weight: 700; color: #1e293b; }
        .text-prompt { font-size: 2.8vh; font-weight: 700; color: #64748b; margin-bottom: 1vh; }
        .text-option { font-size: 2.5vh; font-weight: 700; text-align: center; line-height: 1.1; }

        .btn-game { transition: transform 0.1s; }
        .btn-game:active { transform: scale(0.95); }
        .hidden { display: none !important; }

        /* 选项卡片样式 */
        .option-card {
            background: white;
            border: 3px solid #e2e8f0;
            border-radius: 2vh;
            height: 90%;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 0 #cbd5e1;
            padding: 1vh;
        }
        .option-card.correct { background: #dcfce7; border-color: #22c55e; box-shadow: 0 5px 0 #16a34a; pointer-events: none; }
        .option-card.wrong { background: #fee2e2; border-color: #ef4444; box-shadow: 0 5px 0 #dc2626; }

        .heart { font-size: 4vh; transition: all 0.3s ease; }
        .heart-empty { filter: grayscale(1); opacity: 0.3; }

        /* 连线匹配样式 - 修复 image_4dff96 的显示不全 */
        #matching-container { display: grid; grid-template-cols: 1fr 1fr; gap: 3vw; width: 90%; height: 95%; max-height: 55vh; }
        .match-item { 
            background: white; 
            border: 3px solid #e2e8f0; 
            padding: 0.5vh 2vw; 
            border-radius: 1.5vh; 
            text-align: center; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 2.2vh; 
            font-weight: bold; 
            height: 100%; 
            min-height: 8vh;
        }
        .match-item.selected { border-color: #f59e0b; background: #fffbeb; box-shadow: 0 0 10px #fde68a; }
        .match-item.done { background: #f1f5f9; color: #cbd5e1; pointer-events: none; border-style: dashed; opacity: 0.5; }

        /* 关卡选择按钮 - 居中且美观 */
        .level-btn {
            background: white;
            border: 4px solid #e2e8f0;
            padding: 4vh 6vw;
            border-radius: 3vh;
            font-size: 3.2vh;
            font-weight: 700;
            color: #475569;
            box-shadow: 0 8px 0 #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 25vw;
            margin: 1vh;
        }

        .wrong-shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://cdn.pixabay.com/audio/2022/01/21/audio_31b343360b.mp3" type="audio/mpeg">
    </audio>

    <div id="gameViewport">
        <!-- 头部导航 -->
        <header>
            <div class="flex items-center gap-3">
                <!-- 🏠 按钮固定在左上方 -->
                <button id="home-btn" onclick="goHome()" class="hidden bg-white p-2 rounded-full text-2xl btn-game border-2 border-gray-200 shadow-sm leading-none flex items-center justify-center">🏠</button>
                <button onclick="toggleMaximize()" class="bg-blue-500 text-white px-4 py-2 rounded-xl text-sm font-bold btn-game">最大化</button>
                <button id="musicToggle" onclick="toggleMusic()" class="bg-gray-100 p-2 rounded-full text-xl btn-game border border-gray-200">🔇</button>
            </div>
            <div id="lives-display" class="flex gap-1">
                <span id="h1" class="heart">❤️</span>
                <span id="h2" class="heart">❤️</span>
                <span id="h3" class="heart">❤️</span>
            </div>
        </header>

        <!-- 主内容区 -->
        <div id="main-area">
            
            <!-- 首页：单元选择 -->
            <div id="startScreen" class="w-full h-full flex flex-col items-center justify-center">
                <h1 class="text-[7vh] font-bold text-orange-500 mb-10">小小科学家</h1>
                <div class="grid grid-cols-2 gap-8 w-full max-w-3xl px-6">
                    <button onclick="selectUnit(1)" class="bg-white border-4 border-yellow-400 text-yellow-600 py-8 rounded-[4vh] text-[3.5vh] font-bold shadow-[0_10px_0_#fbbf24] btn-game">单元一：感官</button>
                    <button onclick="selectUnit(2)" class="bg-white border-4 border-green-500 text-green-600 py-8 rounded-[4vh] text-[3.5vh] font-bold shadow-[0_10px_0_#22c55e] btn-game">单元二：生物</button>
                    <button onclick="selectUnit(3)" class="bg-white border-4 border-blue-500 text-blue-600 py-8 rounded-[4vh] text-[3.5vh] font-bold shadow-[0_10px_0_#3b82f6] btn-game">单元三：人类</button>
                    <button onclick="selectUnit(4)" class="bg-white border-4 border-purple-500 text-purple-600 py-8 rounded-[4vh] text-[3.5vh] font-bold shadow-[0_10px_0_#a855f7] btn-game">单元四：动物</button>
                </div>
            </div>

            <!-- 关卡选择阶段（完全居中，无背景Stage干扰） -->
            <div id="unit-level-selector" class="hidden">
                <div id="level-buttons-container" class="flex flex-wrap gap-8 justify-center items-center">
                    <!-- 动态生成关卡按钮，在这里居中显示 -->
                </div>
            </div>

            <!-- 游戏进行阶段 -->
            <div id="gamePlayArea" class="hidden flex flex-col w-full h-full">
                <!-- 舞台区 -->
                <div id="play-stage">
                    <div id="prompt-text" class="text-prompt">请选择：</div>
                    <div id="main-stimulus" class="text-[14vh] bg-white p-8 rounded-full shadow-lg border-4 border-gray-100 leading-none"></div>
                    <div id="main-label" class="text-title mt-2"></div>
                    <div id="matching-box" class="hidden w-full h-full flex items-center justify-center"></div>
                </div>
                <!-- 操作区 -->
                <div id="play-options">
                    <div id="options-grid" class="grid w-full h-full gap-6 items-center px-12">
                        <!-- 动态生成选项按钮 -->
                    </div>
                </div>
            </div>

        </div>

        <!-- 反馈弹窗 -->
        <div id="msgBox" class="fixed inset-0 z-[100] flex items-center justify-center hidden bg-black/40">
            <div class="bg-white p-10 rounded-[50px] text-center shadow-2xl border-8 border-orange-400 scale-110">
                <div class="text-7xl mb-4">🌟</div>
                <div id="msgText" class="text-3xl font-bold mb-8 text-gray-700">太棒了!</div>
                <button onclick="closeMsg()" class="bg-orange-500 text-white px-16 py-4 rounded-full text-2xl font-bold btn-game shadow-lg">确定</button>
            </div>
        </div>
    </div>

    <script>
        let lives = 3;
        let isMusicPlaying = false;
        const bgMusic = document.getElementById('bgMusic');
        let currentUnit = 0;
        let nextLevelCallback = null;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(freq, type, dur) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        }

        function triggerCorrect() { playSfx(880, 'sine', 0.2); }
        function triggerWrong() { 
            playSfx(150, 'square', 0.2); 
            lives--;
            updateLivesUI();
            document.getElementById('gameViewport').classList.add('wrong-shake');
            setTimeout(() => document.getElementById('gameViewport').classList.remove('wrong-shake'), 400);
            if(lives <= 0) {
                setTimeout(() => { alert("再练习一下吧！重新开始。"); goHome(); }, 500);
            }
        }

        function updateLivesUI() {
            for(let i=1; i<=3; i++) {
                const h = document.getElementById('h'+i);
                if(i > lives) { h.classList.add('heart-empty'); h.innerText = "🖤"; }
                else { h.classList.remove('heart-empty'); h.innerText = "❤️"; }
            }
        }

        function toggleMaximize() {
            document.getElementById('gameViewport').classList.toggle('maximized');
        }

        async function toggleMusic() {
            if (!isMusicPlaying) {
                try {
                    await bgMusic.play();
                    isMusicPlaying = true;
                    document.getElementById('musicToggle').innerHTML = '🔊';
                } catch (err) {}
            } else {
                bgMusic.pause();
                isMusicPlaying = false;
                document.getElementById('musicToggle').innerHTML = '🔇';
            }
        }

        // --- 核心导航功能 ---
        function goHome() {
            lives = 3; 
            updateLivesUI();
            document.getElementById('startScreen').classList.remove('hidden');
            document.getElementById('unit-level-selector').classList.add('hidden');
            document.getElementById('gamePlayArea').classList.add('hidden');
            document.getElementById('home-btn').classList.add('hidden');
        }

        function selectUnit(u) {
            currentUnit = u;
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('unit-level-selector').classList.remove('hidden');
            document.getElementById('gamePlayArea').classList.add('hidden');
            document.getElementById('home-btn').classList.remove('hidden');
            renderLevelButtons(u);
            if(!isMusicPlaying) toggleMusic();
        }

        function renderLevelButtons(u) {
            const container = document.getElementById('level-buttons-container');
            container.innerHTML = '';
            const games = {
                1: [['配配乐', 'u1g1'], ['食物分类', 'u1g2'], ['神奇感觉', 'u1g3']],
                2: [['生物需求', 'u2g1'], ['找出生物', 'u2g2'], ['特征配对', 'u2g3'], ['植物部位', 'u2g4'], ['交通工具', 'u2g5']],
                3: [['我的身体', 'u3g1']],
                4: [['动物种类', 'u4g1'], ['动物特征', 'u4g2']]
            };
            games[u].forEach(g => {
                const b = document.createElement('button');
                b.className = "level-btn btn-game";
                b.innerText = g[0];
                b.onclick = () => startLevel(g[1]);
                container.appendChild(b);
            });
        }

        function startLevel(id) {
            document.getElementById('unit-level-selector').classList.add('hidden');
            document.getElementById('gamePlayArea').classList.remove('hidden');
            document.getElementById('options-grid').innerHTML = '';
            document.getElementById('main-label').innerText = '';
            document.getElementById('main-stimulus').classList.remove('hidden');
            document.getElementById('matching-box').classList.add('hidden');
            
            if(id === 'u1g1') initU1G1();
            else if(id === 'u1g2') initU1G2(1);
            else if(id === 'u1g3') initU1G3(0);
            else if(id === 'u2g1') initU2G1();
            else if(id === 'u2g2') initU2G2();
            else if(id === 'u2g3') initU2G3(0);
            else if(id === 'u2g4') initU2G4(0);
            else if(id === 'u2g5') initU2G5(0);
            else if(id === 'u3g1') initU3G1(0);
            else if(id === 'u4g1') initU4G1(0);
            else if(id === 'u4g2') initU4G2(0);
        }

        function renderOptions(items, cols = 4) {
            const grid = document.getElementById('options-grid');
            grid.className = `grid grid-cols-${cols} gap-6 w-full h-full px-12`;
            grid.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = "option-card btn-game";
                card.innerHTML = `
                    ${item.i ? `<div class="text-[7vh] mb-1">${item.i}</div>` : ''}
                    <div class="text-option">${item.n}</div>
                `;
                card.onclick = () => item.action(card);
                grid.appendChild(card);
            });
        }

        // --- 游戏关卡实现 ---
        function initU1G1() {
            document.getElementById('prompt-text').innerText = "连一连器官和它的功能：";
            document.getElementById('main-stimulus').classList.add('hidden');
            const box = document.getElementById('matching-box'); box.classList.remove('hidden');
            box.innerHTML = `<div id="matching-container"><div id="m-left" class="flex flex-col gap-2"></div><div id="m-right" class="flex flex-col gap-2"></div></div>`;
            const data = [{o:'鼻子',s:'👃',a:'闻'},{o:'眼睛',s:'👀',a:'看'},{o:'耳朵',s:'👂',a:'听'},{o:'舌头',s:'👅',a:'尝'},{o:'手',s:'✋',a:'感觉'}];
            let sel = null; let count = 0;
            const left = document.getElementById('m-left'); const right = document.getElementById('m-right');
            [...data].sort(()=>Math.random()-0.5).forEach(d => {
                const el = document.createElement('div'); el.className="match-item"; el.innerText = d.s + " " + d.o;
                el.onclick = () => { document.querySelectorAll('#m-left .match-item').forEach(x=>x.classList.remove('selected')); el.classList.add('selected'); sel = d; };
                left.appendChild(el);
            });
            [...data].sort(()=>Math.random()-0.5).forEach(d => {
                const el = document.createElement('div'); el.className="match-item"; el.innerText = d.a;
                el.onclick = () => { if(!sel) return; if(sel.a === d.a) { triggerCorrect(); el.classList.add('done'); document.querySelector('#m-left .selected').classList.add('done'); count++; if(count===5) setTimeout(()=>showMessage("配对全对！"),300); sel = null; } else triggerWrong(); };
                right.appendChild(el);
            });
        }

        function initU1G2(page) {
            const isH = page === 1;
            document.getElementById('prompt-text').innerText = isH ? "选出健康的食物：" : "选出不健康的食物：";
            document.getElementById('main-stimulus').innerText = isH ? "🍎" : "🍬";
            const h = [{n:'苹果',i:'🍎'},{n:'西兰花',i:'🥦'},{n:'牛奶',i:'🥛'},{n:'香蕉',i:'🍌'}];
            const u = [{n:'糖果',i:'🍬'},{n:'薯条',i:'🍟'},{n:'甜甜圈',i:'🍩'},{n:'汽水',i:'🥤'}];
            const targets = isH ? h : u; const noise = isH ? u : [{n:'鱼肉',i:'🐟'},{n:'水',i:'💧'},{n:'鸡蛋',i:'🥚'},{n:'橙子',i:'🍊'}];
            const items = [...targets.map(x=>({...x,c:1})), ...noise.map(x=>({...x,c:0}))].sort(()=>Math.random()-0.5);
            let count = 0;
            renderOptions(items.map(it => ({ n: it.n, i: it.i, action: (el) => { if(it.c) { if(!el.classList.contains('correct')) { triggerCorrect(); el.classList.add('correct'); count++; if(count === 4) { if(isH) { showMessage("太棒了！接下来找不健康的。"); nextLevelCallback = () => initU1G2(2); } else showMessage("完成！"); } } } else triggerWrong(); } })), 4);
        }

        function initU1G3(idx) {
            const sData = [{n:'石头',i:'🪨',a:'粗',o:['粗','滑','软']},{n:'镜子',i:'🪞',a:'滑',o:['滑','硬','冷']},{n:'砖块',i:'🧱',a:'硬',o:['硬','软','酸']},{n:'枕头',i:'☁️',a:'软',o:['软','硬','热']},{n:'冰块',i:'🧊',a:'冷',o:['冷','热','咸']},{n:'火焰',i:'🔥',a:'热',o:['热','冷','辣']},{n:'柠檬',i:'🍋',a:'酸',o:['酸','甜','苦']},{n:'糖果',i:'🍭',a:'甜',o:['甜','酸','咸']},{n:'药',i:'💊',a:'苦',o:['苦','辣','甜']},{n:'辣椒',i:'🌶️',a:'辣',o:['辣','酸','甜']},{n:'盐',i:'🧂',a:'咸',o:['咸','酸','甜']}];
            const d = sData[idx]; document.getElementById('prompt-text').innerText = "这是什么感觉？"; document.getElementById('main-stimulus').innerText = d.i; document.getElementById('main-label').innerText = d.n;
            renderOptions(d.o.map(o => ({ n: o, action: () => { if(o === d.a) { triggerCorrect(); if(idx + 1 < sData.length) initU1G3(idx + 1); else showMessage("所有感觉都找对啦！"); } else triggerWrong(); } })), 3);
        }

        const bodyParts = [{n:'眉毛',i:'🤨'},{n:'眼睛',i:'👀'},{n:'嘴巴',i:'👄'},{n:'下巴',i:'🧔'},{n:'手臂',i:'💪'},{n:'手',i:'✋'},{n:'耳朵',i:'👂'},{n:'鼻子',i:'👃'},{n:'牙齿',i:'🦷'},{n:'胸部',i:'👕'},{n:'肚子',i:'🤰'},{n:'腿',i:'🦵'},{n:'脚趾',i:'🦶'},{n:'膝盖',i:'🦵'},{n:'脚',i:'👣'}];
        function initU3G1(idx) {
            const data = bodyParts[idx]; document.getElementById('prompt-text').innerText = "这是哪个部位？"; document.getElementById('main-stimulus').innerText = data.i;
            let decoy = bodyParts.filter(x=>x.n !== data.n).sort(()=>Math.random()-0.5)[0];
            renderOptions([data, decoy].sort(()=>Math.random()-0.5).map(it => ({ n: it.n, action: () => { if(it.n === data.n) { triggerCorrect(); if(idx + 1 < bodyParts.length) initU3G1(idx + 1); else showMessage("挑战成功！"); } else triggerWrong(); } })), 2);
        }

        function initU2G1() {
            document.getElementById('prompt-text').innerText = "生物需要什么生存？"; document.getElementById('main-stimulus').innerText = "🌱";
            const needs = [{n:'空气',i:'🌬️',c:1},{n:'阳光',i:'☀️',c:1},{n:'食物',i:'🍲',c:1},{n:'水',i:'💧',c:1},{n:'手机',i:'📱',c:0},{n:'电视',i:'📺',c:0},{n:'钱',i:'💰',c:0},{n:'玩具',i:'🧸',c:0}];
            let count = 0; renderOptions(needs.sort(()=>Math.random()-0.5).map(it => ({ n: it.n, i: it.i, action: (el) => { if(it.c) { if(!el.classList.contains('correct')){ triggerCorrect(); el.classList.add('correct'); count++; if(count===4) showMessage("全对！空气、阳光、食物和水。"); } } else triggerWrong(); } })), 4);
        }

        function initU2G2() {
            document.getElementById('prompt-text').innerText = "哪些是生物？"; document.getElementById('main-stimulus').innerText = "🦁";
            const lib = [{i:'🐈',n:'猫咪',t:1},{i:'🌲',n:'树木',t:1},{i:'🐦',n:'小鸟',t:1},{i:'👦',n:'小朋友',t:1},{i:'🚗',n:'汽车',t:0},{i:'🪨',n:'石头',t:0},{i:'📖',n:'书本',t:0},{i:'☂️',n:'雨伞',t:0}];
            let count = 0; renderOptions([...lib].sort(()=>Math.random()-0.5).map(it => ({ n: it.n, i: it.i, action: (el) => { if(it.t) { if(!el.classList.contains('correct')){ triggerCorrect(); el.classList.add('correct'); count++; if(count===4) showMessage("太棒了！"); } } else triggerWrong(); } })), 4);
        }

        function initU2G3(idx) {
            const p = [{i:'🦅',n:'老鹰',a:'翅膀',o:['翅膀','毛发','四条腿']},{i:'🦁',n:'狮子',a:'毛发',o:['毛发','羽毛','两条腿']},{i:'🐘',n:'大象',a:'四条腿',o:['四条腿','两条腿','翅膀']},{i:'🦆',n:'鸭子',a:'两条腿',o:['两条腿','四条腿','硬壳']}];
            const d = p[idx]; document.getElementById('prompt-text').innerText = "选特征："; document.getElementById('main-stimulus').innerText=d.i; document.getElementById('main-label').innerText=d.n;
            renderOptions(d.o.sort(()=>Math.random()-0.5).map(o => ({ n: o, action: () => { if(o === d.a) { triggerCorrect(); if(idx+1 < p.length) initU2G3(idx+1); else showMessage("对啦！"); } else triggerWrong(); } })), 3);
        }

        function initU2G4(idx) {
            const p = [{i:'🍃',n:'叶子',a:'叶子'},{i:'🎋',n:'茎',a:'茎'},{i:'🌸',n:'花',a:'花'},{i:'🪴',n:'根',a:'根'}];
            const d = p[idx]; document.getElementById('prompt-text').innerText = "这是植物的哪个部位？"; document.getElementById('main-stimulus').innerText = d.i;
            renderOptions(['叶子', '茎', '花', '根'].map(o => ({ n: o, action: () => { if(o === d.a) { triggerCorrect(); if(idx+1 < p.length) initU2G4(idx+1); else showMessage("植物部位全对！"); } else triggerWrong(); } })), 4);
        }

        function initU2G5(idx) {
            const p = [{i:'✈️',n:'直升机',a:'空中'},{i:'🚢',n:'轮船',a:'水上'},{i:'🚀',n:'火箭',a:'空中'}];
            const d = p[idx]; document.getElementById('prompt-text').innerText = "它在哪里航行？"; document.getElementById('main-stimulus').innerText = d.i; document.getElementById('main-label').innerText = d.n;
            renderOptions(['空中', '陆地', '水上'].map(o => ({ n: o, action: () => { if(o === d.a) { triggerCorrect(); if(idx+1 < p.length) initU2G5(idx+1); else showMessage("分得很清楚！"); } else triggerWrong(); } })), 3);
        }

        function initU4G1(idx) {
            const p = [{i:'🐶',n:'狗',a:'哺乳动物'},{i:'🐠',n:'金鱼',a:'鱼'},{i:'🦅',n:'老鹰',a:'鸟'},{i:'🐊',n:'鳄鱼',a:'爬行类'}];
            const d = p[idx]; document.getElementById('prompt-text').innerText = "它是哪一类动物？"; document.getElementById('main-stimulus').innerText = d.i; document.getElementById('main-label').innerText = d.n;
            renderOptions(['哺乳动物', '鱼', '鸟', '爬行类'].map(o => ({ n: o, action: () => { if(o === d.a) { triggerCorrect(); if(idx+1 < p.length) initU4G1(idx+1); else showMessage("分类全对！"); } else triggerWrong(); } })), 2);
        }

        function initU4G2(idx) {
            const tData = [{t:'哺乳动物', trait:'有毛发或皮毛', n:['有羽毛','有鳞片']},{t:'鱼', trait:'用鳃呼吸', n:['用肺呼吸','用气囊呼吸']},{t:'鸟', trait:'羽毛', n:['干燥的鳞片','粘湿的皮肤']},{t:'爬行类', trait:'干燥的鳞片皮肤', n:['滑滑的鳞片','湿润的皮肤']}];
            const d = tData[idx]; document.getElementById('prompt-text').innerText = `${d.t} 的特征是：`; document.getElementById('main-stimulus').innerText = "🐾";
            const opts = [{n:d.trait, c:1}, ...d.n.map(x=>({n:x,c:0}))].sort(()=>Math.random()-0.5);
            renderOptions(opts.map(item => ({ n: item.n, action: () => { if(item.c) { triggerCorrect(); if(idx+1 < tData.length) initU4G2(idx+1); else showMessage("真棒！"); } else triggerWrong(); } })), 3);
        }

        // --- 弹窗与通用逻辑 ---
        function showMessage(t) { document.getElementById('msgText').innerText = t; document.getElementById('msgBox').classList.remove('hidden'); }
        function closeMsg() { document.getElementById('msgBox').classList.add('hidden'); if(nextLevelCallback) { nextLevelCallback(); nextLevelCallback = null; } else { selectUnit(currentUnit); } }
    </script>
</body>
</html>
