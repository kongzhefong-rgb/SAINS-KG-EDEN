<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小小科学家：科学探索乐园</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            color: #444;
            -webkit-font-smoothing: antialiased;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.95);
            border: 5px solid #FFD93D;
            border-radius: 30px;
            box-shadow: 0 8px 0px #FF8B13;
        }

        .btn-game {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 400;
        }

        .btn-game:active {
            transform: scale(0.95);
        }

        .hidden { display: none; }

        .correct-active {
            background-color: #dcfce7 !important; /* bg-green-100 */
            border-color: #22c55e !important;    /* border-green-500 */
            color: #166534 !important;          /* text-green-800 */
        }

        .speaking-active {
            box-shadow: 0 0 12px rgba(255, 139, 19, 0.4);
        }

        .wrong-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: #ef4444;
            pointer-events: none;
            z-index: 10;
        }

        .unit-btn {
            background: white;
            border: 3px solid #f0f0f0;
            border-radius: 20px;
            padding: 1.2rem;
            box-shadow: 0 6px 0 #e0e0e0;
            transition: all 0.2s;
        }

        .unit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 0 #e0e0e0;
        }
        
        h1, h2 { font-weight: 700; letter-spacing: 0.025em; }
        .font-medium { font-weight: 500; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center">

    <audio id="bgMusic" loop>
        <source src="https://cdn.pixabay.com/audio/2022/03/10/audio_c3507d7920.mp3" type="audio/mpeg">
    </audio>

    <!-- Header Stats -->
    <div class="w-full max-w-2xl flex justify-between items-center mb-8">
        <button id="musicToggle" class="bg-white px-5 py-2 rounded-full shadow-sm text-base font-medium text-orange-500 border border-orange-100" onclick="toggleMusic()">音乐：关</button>
        <div class="text-xl font-bold text-orange-500">🌟 科学小助手</div>
        <div id="scoreDisplay" class="bg-white px-6 py-2 rounded-full shadow-sm text-lg font-bold text-green-500 border border-green-50">积分: 0</div>
    </div>

    <!-- Modal Message Box -->
    <div id="messageBox" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-50 hidden">
        <div class="bg-white border-4 border-orange-400 p-8 rounded-[35px] text-center shadow-2xl min-w-[280px]">
            <div id="messageEmoji" class="text-6xl mb-4">🌟</div>
            <div id="messageText" class="text-2xl font-medium text-gray-700">正确!</div>
            <button onclick="closeMessage()" class="mt-6 bg-orange-400 text-white px-10 py-3 rounded-full text-lg shadow-md btn-game">确定</button>
        </div>
    </div>

    <div id="gameContainer" class="w-full max-w-4xl">
        
        <!-- Home Screen -->
        <div id="startScreen" class="game-card p-10 text-center">
            <h1 class="text-3xl md:text-4xl text-orange-500 mb-8">小小科学家：探索乐园</h1>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <button onclick="selectUnit(1)" class="unit-btn border-yellow-200">
                    <div class="text-5xl mb-3">👃</div>
                    <div class="text-xl font-medium text-yellow-600">单元一：五种感官</div>
                </button>
                <button onclick="selectUnit(2)" class="unit-btn border-green-200">
                    <div class="text-5xl mb-3">🌳</div>
                    <div class="text-xl font-medium text-green-600">单元二：生物与非生物</div>
                </button>
            </div>
            <p id="loadingStatus" class="mt-8 text-gray-400 text-sm">点击单元开始，语音将自动加载</p>
        </div>

        <!-- Unit 1 Menu -->
        <div id="unit1Menu" class="hidden space-y-4">
            <h2 class="text-2xl text-center font-bold text-blue-600 mb-6">单元一：五种感官</h2>
            <button onclick="showGame('u1g1')" class="w-full bg-blue-400 text-white p-5 rounded-2xl text-lg font-medium shadow btn-game">游戏一：我能发现什么？👃👀👂</button>
            <button onclick="showGame('u1g2')" class="w-full bg-pink-400 text-white p-5 rounded-2xl text-lg font-medium shadow btn-game">游戏二：健康食物对对碰 🍎🥦</button>
            <button onclick="showGame('u1g3')" class="w-full bg-orange-400 text-white p-5 rounded-2xl text-lg font-medium shadow btn-game">游戏三：神奇的感觉生字 🌡️🍯</button>
            <button onclick="backToHome()" class="w-full bg-gray-400 text-white p-3 rounded-full font-medium">⬅️ 返回首页</button>
        </div>

        <!-- Unit 2 Menu -->
        <div id="unit2Menu" class="hidden space-y-4">
            <h2 class="text-2xl text-center font-bold text-green-600 mb-6">单元二：生物与非生物</h2>
            <button onclick="showGame('u2g1')" class="w-full bg-teal-400 text-white p-5 rounded-2xl text-lg font-medium shadow btn-game">游戏一：生物特征学习 🍱💧</button>
            <button onclick="showGame('u2g2')" class="w-full bg-lime-500 text-white p-5 rounded-2xl text-lg font-medium shadow btn-game">游戏二：他是生物吗？🌳🗿</button>
            <button onclick="showGame('u2g3')" class="w-full bg-purple-400 text-white p-5 rounded-2xl text-lg font-medium shadow btn-game">游戏三：动物特征配对 🦅🐻</button>
            <button onclick="backToHome()" class="w-full bg-gray-400 text-white p-3 rounded-full font-medium">⬅️ 返回首页</button>
        </div>

        <!-- Game Screens -->
        <!-- U1G1: Discovery -->
        <div id="u1g1" class="hidden game-card p-8 text-center">
            <h2 class="text-xl font-bold text-blue-500 mb-8">点击图标，看看这是哪种感官？</h2>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
                <button onclick="handleDiscovery('鼻子', '👃', this)" class="bg-orange-50 p-5 rounded-2xl border-2 border-orange-100 btn-game"><div class="text-4xl mb-2">🌸</div><div class="font-medium">鼻子</div></button>
                <button onclick="handleDiscovery('眼睛', '👀', this)" class="bg-blue-50 p-5 rounded-2xl border-2 border-blue-100 btn-game"><div class="text-4xl mb-2">🌈</div><div class="font-medium">眼睛</div></button>
                <button onclick="handleDiscovery('耳朵', '👂', this)" class="bg-yellow-50 p-5 rounded-2xl border-2 border-yellow-100 btn-game"><div class="text-4xl mb-2">🔔</div><div class="font-medium">耳朵</div></button>
                <button onclick="handleDiscovery('舌头', '👅', this)" class="bg-red-50 p-5 rounded-2xl border-2 border-red-100 btn-game"><div class="text-4xl mb-2">🍦</div><div class="font-medium">舌头</div></button>
                <button onclick="handleDiscovery('手', '✋', this)" class="bg-green-50 p-5 rounded-2xl border-2 border-green-100 btn-game"><div class="text-4xl mb-2">🐈</div><div class="font-medium">手</div></button>
                <button onclick="showUnitMenu(1)" class="bg-gray-100 p-5 rounded-2xl font-medium text-gray-500 btn-game">返回菜单</button>
            </div>
        </div>

        <!-- U1G2: Healthy Food (Multi-selection) -->
        <div id="u1g2" class="hidden game-card p-8 text-center">
            <h2 class="text-xl font-bold text-pink-500 mb-8">选出健康的食物</h2>
            <div id="u1g2Grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
            <button onclick="showUnitMenu(1)" class="mt-8 bg-gray-100 px-8 py-2 rounded-full font-medium text-gray-500">返回菜单</button>
        </div>

        <!-- U1G3: Sensory Words (Sequential Quiz) -->
        <div id="u1g3" class="hidden game-card p-8 text-center">
            <h2 class="text-xl font-bold text-orange-600 mb-4">这张图片给你的感觉是？</h2>
            <div class="mb-6"><div id="u1g3Emoji" class="text-7xl floating">🍭</div></div>
            <div id="u1g3Options" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
            <button onclick="showUnitMenu(1)" class="mt-8 bg-gray-100 px-8 py-2 rounded-full font-medium text-gray-500">返回菜单</button>
        </div>

        <!-- U2G1: Characteristics -->
        <div id="u2g1" class="hidden game-card p-8 text-center">
            <h2 class="text-xl font-bold text-teal-600 mb-8">生物有哪些特征？点击学习！</h2>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
                <button onclick="handleDiscovery('食物', '🍲', this)" class="bg-teal-50 p-5 rounded-2xl border-2 border-teal-100 btn-game"><div class="text-4xl mb-2">🍲💧</div><div class="font-medium">食物</div></button>
                <button onclick="handleDiscovery('繁殖', '🐣', this)" class="bg-teal-50 p-5 rounded-2xl border-2 border-teal-100 btn-game"><div class="text-4xl mb-2">🐣</div><div class="font-medium">繁殖</div></button>
                <button onclick="handleDiscovery('呼吸', '🌬️', this)" class="bg-teal-50 p-5 rounded-2xl border-2 border-teal-100 btn-game"><div class="text-4xl mb-2">🌬️</div><div class="font-medium">呼吸</div></button>
                <button onclick="handleDiscovery('移动', '🏃', this)" class="bg-teal-50 p-5 rounded-2xl border-2 border-teal-100 btn-game"><div class="text-4xl mb-2">🏃</div><div class="font-medium">移动</div></button>
                <button onclick="handleDiscovery('休息', '😴', this)" class="bg-teal-50 p-5 rounded-2xl border-2 border-teal-100 btn-game"><div class="text-4xl mb-2">😴</div><div class="font-medium">休息</div></button>
                <button onclick="showUnitMenu(2)" class="bg-gray-100 p-5 rounded-2xl font-medium text-gray-500 btn-game">返回菜单</button>
            </div>
        </div>

        <!-- U2G2: Living Search (Multi-selection) -->
        <div id="u2g2" class="hidden game-card p-8 text-center">
            <h2 class="text-xl font-bold text-lime-600 mb-8">他是生物吗？找找生物吧！</h2>
            <div id="u2g2Grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
            <button onclick="showUnitMenu(2)" class="mt-8 bg-gray-100 px-10 py-3 rounded-full font-bold text-gray-500">返回菜单</button>
        </div>

        <!-- U2G3: Animal Features (Sequential Quiz) -->
        <div id="u2g3" class="hidden game-card p-8 text-center">
            <h2 class="text-xl font-bold text-purple-600 mb-4">他的特征是什么？</h2>
            <div class="mb-6"><div id="u2g3Emoji" class="text-7xl floating">🐘</div><div id="u2g3Name" class="text-lg font-medium text-gray-400 mt-2">大象</div></div>
            <div id="u2g3Options" class="grid grid-cols-2 gap-4"></div>
            <button onclick="showUnitMenu(2)" class="mt-8 bg-gray-100 px-10 py-3 rounded-full font-bold text-gray-500">返回菜单</button>
        </div>

    </div>

    <script>
        const apiKey = "";
        let score = 0;
        let isMusicPlaying = false;
        const bgMusic = document.getElementById('bgMusic');
        let currentAudio = null;
        let nextCallback = null;
        const audioCache = {};

        // Comprehensive words library
        const WORDS_LIB = [
            "鼻子", "眼睛", "耳朵", "舌头", "手", "选出健康的食物", "他是生物吗？找找生物吧！", "他的特征是什么？", "这张图片给你的感觉是？", "生物有哪些特征？点击学习！",
            "苹果", "西兰花", "牛奶", "香蕉", "胡萝卜", "草莓", "糖果", "薯条", "甜甜圈", "汽水", "冰淇淋", "棒棒糖",
            "冷", "热", "辣", "甜", "酸", "苦", "硬", "软", "滑", "粗", "咸",
            "食物", "繁殖", "呼吸", "移动", "休息", "生物", "非生物", "翅膀", "毛发", "两条腿", "四条腿", "羽毛",
            "树木", "石头", "小鸟", "汽车", "小朋友", "书本", "猫咪", "玩具", "手机", "花朵", "雨伞", "青蛙", "桌子", "太阳", "蝴蝶", "皮球", "长颈鹿", "斑马", "太棒了", "你全找对啦"
        ];

        // --- TTS Retry Logic ---
        async function fetchWithRetry(word, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: word }] }],
                generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } }
            };

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok) return await response.json();
                    if (response.status !== 429 && response.status < 500) break;
                } catch (e) {}
                if (i < retries - 1) await new Promise(r => setTimeout(r, delays[i]));
            }
            throw new Error(`TTS Loading Failed: ${word}`);
        }

        // --- Preload Audio ---
        async function preloadAudio(words) {
            const status = document.getElementById('loadingStatus');
            status.innerText = "正在为您加载语音...";
            
            const batchSize = 3;
            for (let i = 0; i < words.length; i += batchSize) {
                const batch = words.slice(i, i + batchSize);
                await Promise.all(batch.map(async (word) => {
                    if (audioCache[word]) return;
                    try {
                        const result = await fetchWithRetry(word);
                        const inlineData = result.candidates?.[0]?.content?.parts?.[0]?.inlineData;
                        if (inlineData) {
                            const sampleRate = parseInt(inlineData.mimeType.split("sampleRate=")[1]) || 24000;
                            audioCache[word] = URL.createObjectURL(pcmToWav(inlineData.data, sampleRate));
                        }
                    } catch (e) { console.error(e.message); }
                }));
                await new Promise(r => setTimeout(r, 200));
            }
            status.innerText = "语音加载完毕，准备开始！";
        }

        function speak(word) {
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            if (audioCache[word]) {
                currentAudio = new Audio(audioCache[word]);
                currentAudio.play();
            } else {
                fetchSpeechOnly(word);
            }
        }

        async function fetchSpeechOnly(word) {
            try {
                const result = await fetchWithRetry(word);
                const data = result.candidates?.[0]?.content?.parts?.[0]?.inlineData;
                if(data) {
                    const url = URL.createObjectURL(pcmToWav(data.data, 24000));
                    audioCache[word] = url;
                    speak(word);
                }
            } catch(e) {}
        }

        function pcmToWav(base64, rate) {
            const bin = atob(base64); const len = bin.length;
            const bytes = new Uint8Array(len); for (let i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
            const buffer = new ArrayBuffer(44 + len); const view = new DataView(buffer);
            const writeString = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
            writeString(0, 'RIFF'); view.setUint32(4, 36 + len, true); writeString(8, 'WAVE');
            writeString(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true);
            view.setUint16(22, 1, true); view.setUint32(24, rate, true);
            view.setUint32(28, rate * 2, true); view.setUint16(32, 2, true);
            view.setUint16(34, 16, true); writeString(36, 'data'); view.setUint32(40, len, true);
            for (let i = 0; i < len; i++) view.setUint8(44 + i, bytes[i]);
            return new Blob([buffer], { type: 'audio/wav' });
        }

        // --- Interaction Logic ---
        function selectUnit(u) {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById(`unit${u}Menu`).classList.remove('hidden');
            if (!isMusicPlaying) toggleMusic();
            preloadAudio(WORDS_LIB);
        }

        function showGame(id) {
            document.querySelectorAll('[id^="unit"], .game-card').forEach(el => el.classList.add('hidden'));
            const target = document.getElementById(id);
            target.classList.remove('hidden');
            
            const title = target.querySelector('h2').innerText;
            speak(title);

            if(id === 'u1g2') initU1G2();
            if(id === 'u1g3') initU1G3();
            if(id === 'u2g2') initU2G2();
            if(id === 'u2g3') initU2G3();
        }

        // For Discovery/Characteristic games (G1)
        function handleDiscovery(word, emoji, btn) {
            speak(word);
            btn.classList.add('correct-active');
            showMessage(word, '🌟');
            nextCallback = () => {
                btn.classList.remove('correct-active');
            };
        }

        // --- Game 2 Logic: Multi-select Collection ---
        let collectionCount = 0;
        let collectionTarget = 0;

        function initU1G2() {
            collectionCount = 0;
            const grid = document.getElementById('u1g2Grid');
            grid.innerHTML = '';
            const foodLib = [
                { icon: '🍎', name: '苹果', h: true }, { icon: '🥦', name: '西兰花', h: true },
                { icon: '🥛', name: '牛奶', h: true }, { icon: '🍌', name: '香蕉', h: true },
                { icon: '🥕', name: '胡萝卜', h: true }, { icon: '🍓', name: '草莓', h: true },
                { icon: '🍬', name: '糖果', h: false }, { icon: '🍟', name: '薯条', h: false },
                { icon: '🍩', name: '甜甜圈', h: false }, { icon: '🥤', name: '汽水', h: false },
                { icon: '🍦', name: '冰淇淋', h: false }, { icon: '🍭', name: '棒棒糖', h: false }
            ];
            const healthyOnes = foodLib.filter(f => f.h).sort(() => Math.random() - 0.5).slice(0, 4);
            const unhealthyOnes = foodLib.filter(f => !f.h).sort(() => Math.random() - 0.5).slice(0, 4);
            collectionTarget = healthyOnes.length;
            const items = [...healthyOnes, ...unhealthyOnes].sort(() => Math.random() - 0.5);

            items.forEach(item => {
                const b = document.createElement('button');
                b.className = "relative bg-white border-2 border-gray-100 p-4 rounded-2xl shadow-sm btn-game overflow-hidden";
                b.innerHTML = `<div class="text-4xl mb-2">${item.icon}</div><div class="font-medium text-sm">${item.name}</div>`;
                b.onclick = () => {
                    speak(item.name);
                    if (item.h) {
                        if (!b.classList.contains('correct-active')) {
                            b.classList.add('correct-active');
                            collectionCount++;
                            if (collectionCount === collectionTarget) {
                                setTimeout(() => {
                                    speak("你全找对啦");
                                    showMessage("你全找对啦", "🌟");
                                }, 800);
                            }
                        }
                    } else {
                        const x = document.createElement('div'); x.className = 'wrong-overlay'; x.innerText = '❌';
                        b.appendChild(x); setTimeout(() => b.removeChild(x), 800);
                    }
                };
                grid.appendChild(b);
            });
        }

        function initU2G2() {
            collectionCount = 0;
            const grid = document.getElementById('u2g2Grid');
            grid.innerHTML = '';
            const lib = [
                { i: '🐈', n: '猫咪', t: '生物' }, { i: '🌲', n: '树木', t: '生物' }, { i: '🐦', n: '小鸟', t: '生物' }, { i: '👦', n: '小朋友', t: '生物' }, { i: '🐸', n: '青蛙', t: '生物' }, { i: '🦋', n: '蝴蝶', t: '生物' }, { i: '🌻', n: '花朵', t: '生物' }, { i: '🐕', n: '小狗', t: '生物' }, { i: '🦒', n: '长颈鹿', t: '生物' }, { i: '🦓', n: '斑马', t: '生物' },
                { i: '🚗', n: '汽车', t: '非生物' }, { i: '🪨', n: '石头', t: '非生物' }, { i: '📖', n: '书本', t: '非生物' }, { i: '☂️', n: '雨伞', t: '非生物' }, { i: '⚽', n: '皮球', t: '非生物' }, { i: '📱', n: '手机', t: '非生物' }, { i: '🧸', n: '玩具', t: '非生物' }, { i: '🪑', n: '桌子', t: '非生物' }
            ];
            const livingOnes = lib.filter(f => f.t === '生物').sort(() => Math.random() - 0.5).slice(0, 4);
            const nonLivingOnes = lib.filter(f => f.t === '非生物').sort(() => Math.random() - 0.5).slice(0, 4);
            collectionTarget = livingOnes.length;
            const items = [...livingOnes, ...nonLivingOnes].sort(() => Math.random() - 0.5);

            items.forEach(item => {
                const b = document.createElement('button');
                b.className = "bg-white border-2 border-gray-100 p-4 rounded-2xl shadow-sm btn-game";
                b.innerHTML = `<div class="text-4xl mb-2">${item.i}</div><div class="font-medium text-xs">${item.n}</div>`;
                b.onclick = () => {
                    speak(item.n);
                    if (item.t === '生物') {
                        if (!b.classList.contains('correct-active')) {
                            b.classList.add('correct-active');
                            collectionCount++;
                            if (collectionCount === collectionTarget) {
                                setTimeout(() => {
                                    speak("太棒了");
                                    showMessage("太棒了", "🌟");
                                }, 800);
                            }
                        }
                    } else {
                        const x = document.createElement('div'); x.className = 'wrong-overlay'; x.innerText = '❌';
                        b.appendChild(x); setTimeout(() => b.removeChild(x), 800);
                    }
                };
                grid.appendChild(b);
            });
        }

        // --- Game 3 Logic: Sequential Quiz ---
        let u1g3Idx = 0;
        function initU1G3() {
            const data = [
                { icon: '🧊', ans: '冷', opts: ['冷', '热', '软'] }, { icon: '🌶️', ans: '辣', opts: ['辣', '酸', '甜'] },
                { icon: '🍋', ans: '酸', opts: ['酸', '甜', '苦'] }, { icon: '🧱', ans: '粗', opts: ['粗', '滑', '软'] },
                { icon: '🌵', ans: '硬', opts: ['硬', '软', '滑'] }, { icon: '🍦', ans: '甜', opts: ['甜', '酸', '咸'] }
            ][u1g3Idx];
            document.getElementById('u1g3Emoji').innerText = data.icon;
            const og = document.getElementById('u1g3Options');
            og.innerHTML = '';
            data.opts.sort(() => Math.random() - 0.5).forEach(o => {
                const b = document.createElement('button');
                b.className = "bg-orange-50 p-5 rounded-xl font-medium border border-orange-100 btn-game text-lg";
                b.innerText = o;
                b.onclick = () => {
                    speak(o);
                    if(o === data.ans) {
                        b.classList.add('correct-active');
                        setTimeout(() => {
                            showMessage(o, '🌟');
                            nextCallback = () => {
                                u1g3Idx = (u1g3Idx + 1) % 6;
                                initU1G3();
                            };
                        }, 500);
                    } else {
                        const x = document.createElement('div'); x.className = 'wrong-overlay'; x.innerText = '❌';
                        b.appendChild(x); setTimeout(() => b.removeChild(x), 800);
                    }
                };
                og.appendChild(b);
            });
        }

        let u2g3Idx = 0;
        function initU2G3() {
            const data = [
                { i: '🦅', n: '老鹰', a: '翅膀', opts: ['翅膀', '毛发', '四条腿'] },
                { i: '🦁', n: '狮子', a: '毛发', opts: ['毛发', '羽毛', '两条腿'] },
                { i: '🦢', n: '天鹅', a: '羽毛', opts: ['羽毛', '毛发', '翅膀'] },
                { i: '🐘', n: '大象', a: '四条腿', opts: ['四条腿', '两条腿', '翅膀'] },
                { i: '🦆', n: '鸭子', a: '两条腿', opts: ['两条腿', '四条腿', '翅膀'] }
            ][u2g3Idx];
            document.getElementById('u2g3Emoji').innerText = data.i;
            document.getElementById('u2g3Name').innerText = data.n;
            const og = document.getElementById('u2g3Options');
            og.innerHTML = '';
            data.opts.sort(() => Math.random() - 0.5).forEach(o => {
                const b = document.createElement('button');
                b.className = "bg-purple-50 p-5 rounded-xl font-medium border border-purple-100 btn-game text-lg";
                b.innerText = o;
                b.onclick = () => {
                    speak(o);
                    if(o === data.a) {
                        b.classList.add('correct-active');
                        setTimeout(() => {
                            showMessage(o, '🌟');
                            nextCallback = () => {
                                u2g3Idx = (u2g3Idx + 1) % 5;
                                initU2G3();
                            };
                        }, 500);
                    } else {
                        const x = document.createElement('div'); x.className = 'wrong-overlay'; x.innerText = '❌';
                        b.appendChild(x); setTimeout(() => b.removeChild(x), 800);
                    }
                };
                og.appendChild(b);
            });
        }

        // --- Common Helpers ---
        function toggleMusic() {
            isMusicPlaying = !isMusicPlaying;
            if (isMusicPlaying) bgMusic.play(); else bgMusic.pause();
            document.getElementById('musicToggle').innerText = isMusicPlaying ? '音乐：开' : '音乐：关';
        }
        function backToHome() {
            document.querySelectorAll('[id$="Menu"], .game-card').forEach(el => el.classList.add('hidden'));
            document.getElementById('startScreen').classList.remove('hidden');
        }
        function showUnitMenu(u) {
            document.querySelectorAll('.game-card').forEach(el => el.classList.add('hidden'));
            document.getElementById(`unit${u}Menu`).classList.remove('hidden');
        }
        function showMessage(t, e) {
            document.getElementById('messageText').innerText = t;
            document.getElementById('messageEmoji').innerText = e;
            document.getElementById('messageBox').classList.remove('hidden');
        }
        function closeMessage() { 
            document.getElementById('messageBox').classList.add('hidden'); 
            score += 10; 
            document.getElementById('scoreDisplay').innerText = `积分: ${score}`; 
            if (nextCallback) {
                const cb = nextCallback;
                nextCallback = null;
                cb();
            }
        }
    </script>
</body>
</html>
